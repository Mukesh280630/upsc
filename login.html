<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPSC Hub - Login & Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>UPSC Hub Portal</h2>
        
        <!-- Login Form -->
        <div id="login-section">
            <h3>Student & Admin Login</h3>
            <input type="email" id="login-email" placeholder="Email Address" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button onclick="loginUser()">Login</button>
            <p>New Student? <a href="#" onclick="toggleForms('register')">Register here</a></p>
        </div>

        <!-- Registration Form (Hidden by default) -->
        <div id="register-section" style="display: none;">
            <h3>Create Student Account</h3>
            <input type="email" id="reg-email" placeholder="Email Address" required>
            <input type="password" id="reg-password" placeholder="Password (min 6 characters)" required>
            <button onclick="registerUser()">Register</button>
            <p>Already registered? <a href="#" onclick="toggleForms('login')">Login here</a></p>
        </div>
    </div>

    <!-- Firebase SDKs for Online Connection -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <!-- Your Custom Script -->
    <script src="script.js"></script>
</body>
</html>
